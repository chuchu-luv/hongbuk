<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>✨ 홍북초 야근 현황 ✨</title>
  
  <!-- Tailwind CSS 로드 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel (브라우저에서 React 코드를 읽을 수 있게 해주는 도구) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <!-- 🤫 all copyright reserved BOHAE -->
  
  <!-- 앱이 그려질 도화지 -->
  <div id="root"></div>

  <!-- React 및 앱 로직 시작 -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { Clock, MapPin, User, LogOut, Edit2, AlertCircle, CheckCircle2, Star, ChevronLeft, X, MessageSquare, Phone, ChevronDown } from 'https://esm.sh/lucide-react@0.292.0';

    // 🔥 구글 시트 URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzxtX__FhkSQj7MHiK_r6JJJeqVlyabzY_-bvSbcoXHXOjP-jI3_8bvG3ep9G0raK0T/exec"; 

    // ✨ 강력한 에러 방어막 함수들 (찌꺼기 데이터로 인한 흰 화면 방지)
    const getSafeArray = (key) => {
      try {
        const val = JSON.parse(localStorage.getItem(key));
        return Array.isArray(val) ? val : [];
      } catch(e) { return []; }
    };
    
    const getSafeObject = (key) => {
      try {
        const val = JSON.parse(localStorage.getItem(key));
        return (val && typeof val === 'object' && !Array.isArray(val)) ? val : {};
      } catch(e) { return {}; }
    };

    function App() {
      const [currentDate, setCurrentDate] = useState(new Date());
      const [name, setName] = useState('');
      const [location, setLocation] = useState('');
      const [contact, setContact] = useState(''); 
      const [memo, setMemo] = useState('');
      const [hour, setHour] = useState('');
      const [minute, setMinute] = useState('00');
      
      const [records, setRecords] = useState([]); 
      const [myRecordId, setMyRecordId] = useState(null); 
      const [userMemory, setUserMemory] = useState({}); 
      const [isEditing, setIsEditing] = useState(false);
      
      // 자동완성 추천 목록 상태
      const [suggestions, setSuggestions] = useState([]);
      
      // 지난 내역 관련 상태
      const [showHistory, setShowHistory] = useState(false); 
      const [pastRecords, setPastRecords] = useState([]);
      const [isLoadingHistory, setIsLoadingHistory] = useState(false);

      const days = ['일', '월', '화', '수', '목', '금', '토'];
      const dateString = `${currentDate.getFullYear()}년 ${currentDate.getMonth() + 1}월 ${currentDate.getDate()}일 ${days[currentDate.getDay()]}요일`;

      const hourOptions = useMemo(() => {
        const hours = [];
        for (let i = 9; i <= 23; i++) {
          hours.push(i.toString().padStart(2, '0'));
        }
        return hours;
      }, []);
      const minuteOptions = ['00', '10', '20', '30', '40', '50'];

      // ✨ 서버 데이터 정제 (5-1 등이 날짜로 변환된 것 복구 및 방어 코드)
      const sanitizeServerData = (data) => {
        if (!Array.isArray(data)) return [];
        return data.map(r => {
          let locStr = r.location ? String(r.location).replace(/^'/, '') : '';
          if (locStr.includes('T') && (locStr.endsWith('Z') || locStr.includes('+09:00'))) {
            const d = new Date(locStr);
            if (!isNaN(d.getTime())) {
              locStr = `${d.getMonth() + 1}-${d.getDate()}`;
            }
          }
          return { ...r, location: locStr };
        });
      };

      // ✨ 서버 및 로컬 데이터 동기화
      useEffect(() => {
        // 서버에서 최신 데이터를 가져오는 함수
        const fetchUpdates = async () => {
          if (!SCRIPT_URL) return null;
          try {
            const response = await fetch(`${SCRIPT_URL}?t=${new Date().getTime()}`);
            const rawData = await response.json();
            const data = sanitizeServerData(rawData);
            
            setPastRecords(data);
            
            const todayStr = `${currentDate.getFullYear()}년 ${currentDate.getMonth() + 1}월 ${currentDate.getDate()}일`;

            const todayRecords = data.filter(r => {
              if (!r.date) return false;
              const dStr = String(r.date).replace(/'/g, '').trim();
              if (dStr.includes(todayStr) || dStr.includes(dateString)) return true;
              if (dStr.includes('T')) {
                const d = new Date(dStr);
                if (!isNaN(d.getTime())) {
                  return d.getFullYear() === currentDate.getFullYear() &&
                         d.getMonth() === currentDate.getMonth() &&
                         d.getDate() === currentDate.getDate();
                }
              }
              return false;
            }).map(r => {
              const isLeft = String(r.status || '').includes('퇴근');
              const leaveTime = isLeft ? String(r.status).split(' ')[0] : null;
              
              let timeStr = String(r.time || '');
              if (timeStr.includes('T')) {
                const d = new Date(timeStr);
                if (!isNaN(d.getTime())) {
                  timeStr = `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
                }
              }

              return {
                id: String(r.id),
                name: String(r.name || ''),
                time: timeStr,
                contact: String(r.contact || ''),
                location: r.location || '',
                memo: r.memo || '',
                status: r.status || '',
                isLeft: isLeft,
                leaveTime: leaveTime
              };
            });

            setRecords(todayRecords);
            return todayRecords;
          } catch (e) {
            console.error("서버 데이터 로드 실패", e);
            return null;
          }
        };

        // 처음 켜졌을 때 초기화
        const loadInitialData = async () => {
          const savedMemory = getSafeObject('userMemory');
          const savedMyId = localStorage.getItem('myRecordId');
          setUserMemory(savedMemory);
          
          if (savedMyId && savedMyId !== "null" && savedMyId !== "undefined") {
            setMyRecordId(savedMyId);
          }
          setHour(hourOptions[0]);

          const todayRecords = await fetchUpdates();
          
          if (todayRecords) {
            if (savedMyId) {
              const myServerStatus = todayRecords.find(tr => tr.id === savedMyId);
              if (!myServerStatus || myServerStatus.isLeft) {
                setMyRecordId(null);
                localStorage.removeItem('myRecordId');
              }
            }
          } else {
            setRecords(getSafeArray('schoolRecords'));
          }
        };

        loadInitialData();

        // ✨ 60초(60000ms)마다 백그라운드에서 조용히 새로고침 (서버 부하 방지!)
        const intervalId = setInterval(async () => {
          const freshRecords = await fetchUpdates();
          
          // 만약 폰에서 퇴근을 눌렀다면, PC 화면에서도 내 폼을 자동으로 '퇴근 완료' 상태(폼 초기화)로 변경
          setMyRecordId(prevId => {
            if (prevId && freshRecords) {
              const myServerStatus = freshRecords.find(tr => tr.id === prevId);
              if (!myServerStatus || myServerStatus.isLeft) {
                localStorage.removeItem('myRecordId');
                return null;
              }
            }
            return prevId;
          });
        }, 60000); // 60초마다 갱신 (안정성 확보)

        // ✨ 브라우저 탭 활성화 시 즉시 갱신 (PC 백그라운드 타이머 멈춤 현상 완벽 방지)
        const handleVisibilityChange = async () => {
          if (document.visibilityState === 'visible') {
            const freshRecords = await fetchUpdates();
            setMyRecordId(prevId => {
              if (prevId && freshRecords) {
                const myServerStatus = freshRecords.find(tr => tr.id === prevId);
                if (!myServerStatus || myServerStatus.isLeft) {
                  localStorage.removeItem('myRecordId');
                  return null;
                }
              }
              return prevId;
            });
          }
        };
        document.addEventListener('visibilitychange', handleVisibilityChange);

        return () => {
          clearInterval(intervalId);
          document.removeEventListener('visibilitychange', handleVisibilityChange);
        };
      }, [hourOptions, currentDate, dateString]);

      // 배열이 아닐 경우 뻗지 않도록 무조건 배열로 강제 보장하는 방어막!
      const safeRecords = Array.isArray(records) ? records : [];
      const safePastRecords = Array.isArray(pastRecords) ? pastRecords : [];

      // ✨ 동명이인 구분 자동완성 로직
      useEffect(() => {
        if (name && name.length >= 1) {
          const allSources = [
            ...safeRecords.map(r => ({ name: r.name, location: r.location, contact: r.contact, todayId: r.isLeft ? null : r.id })),
            ...safePastRecords.map(r => ({ name: r.name, location: r.location, contact: r.contact, todayId: null })),
            ...Object.keys(userMemory).map(k => ({ name: k, location: userMemory[k]?.location, contact: userMemory[k]?.contact, todayId: null }))
          ];

          const filtered = allSources.filter(p => p.name && String(p.name).includes(name));
          
          const uniqueMap = new Map();

          filtered.forEach(p => {
            const key = `${p.name}-${p.location}-${p.contact}`;
            if (!uniqueMap.has(key)) {
              uniqueMap.set(key, { ...p });
            } else {
              if (!uniqueMap.get(key).todayId && p.todayId) {
                uniqueMap.get(key).todayId = p.todayId;
              }
            }
          });

          setSuggestions(Array.from(uniqueMap.values()).slice(0, 5));
        } else {
          setSuggestions([]);
        }
      }, [name, safeRecords, safePastRecords, userMemory]);

      const handleSelectSuggestion = (person) => {
        setName(person.name || '');
        setLocation(person.location || '');
        setContact(person.contact || '');
        setSuggestions([]);

        if (person.todayId) {
          setMyRecordId(person.todayId);
          localStorage.setItem('myRecordId', person.todayId);
          setIsEditing(false); 
        }
      };

      const formatPhoneNumber = (num) => {
        if (!num) return '';
        const cleaned = ('' + num).replace(/\D/g, ''); 
        const match = cleaned.match(/^(\d{2,3})(\d{3,4})(\d{4})$/);
        if (match) return `${match[1]}-${match[2]}-${match[3]}`;
        return cleaned;
      };

      const sendToGoogleSheet = async (action, recordData) => {
        if (!SCRIPT_URL) return; 
        try {
          await fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: action, record: recordData })
          });
        } catch (e) { console.log("시트 전송 에러:", e); }
      };

      const handleSave = () => {
        if (!name || !hour || !contact) {
          alert("이름, 시간, 연락처를 모두 입력해주세요! 🥺");
          return;
        }

        const formattedContact = formatPhoneNumber(contact);
        const timeString = `${hour}:${minute}`;
        
        const newMemory = { ...userMemory, [name]: { location, contact: formattedContact } };
        setUserMemory(newMemory);
        localStorage.setItem('userMemory', JSON.stringify(newMemory));

        let updatedRecords;
        let recordId;
        let actionType;
        let currentRecord;

        if (myRecordId) {
          recordId = myRecordId;
          actionType = 'update';
          currentRecord = { id: recordId, name, location, contact: formattedContact, memo, time: timeString, isLeft: false };
          updatedRecords = safeRecords.map(r => r.id === myRecordId ? currentRecord : r);
        } else {
          recordId = Date.now().toString();
          actionType = 'save';
          currentRecord = { id: recordId, name, location: location || '', contact: formattedContact || '', memo: memo || '', time: timeString, isLeft: false };
          updatedRecords = [...safeRecords, currentRecord];
          setMyRecordId(recordId);
          localStorage.setItem('myRecordId', recordId);
        }

        setRecords(updatedRecords);
        localStorage.setItem('schoolRecords', JSON.stringify(updatedRecords));
        setContact(formattedContact); 
        setIsEditing(false);

        sendToGoogleSheet(actionType, {
          id: currentRecord.id,
          date: dateString,
          name: currentRecord.name,
          time: currentRecord.time,
          contact: currentRecord.contact,
          location: currentRecord.location ? "'" + currentRecord.location : "",
          memo: currentRecord.memo,
          status: '근무중'
        });
      };

      const handleLeave = () => {
        const now = new Date();
        const leaveTimeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        const myCurrentRecord = safeRecords.find(r => r.id === myRecordId);
        const updatedRecords = safeRecords.map(r => r.id === myRecordId ? { ...r, isLeft: true, leaveTime: leaveTimeStr } : r);
        
        setRecords(updatedRecords);
        localStorage.setItem('schoolRecords', JSON.stringify(updatedRecords));
        
        if (myCurrentRecord) {
          sendToGoogleSheet('update', {
            id: myCurrentRecord.id,
            date: dateString,
            name: myCurrentRecord.name,
            time: myCurrentRecord.time,
            contact: myCurrentRecord.contact,
            location: myCurrentRecord.location ? "'" + myCurrentRecord.location : "",
            memo: myCurrentRecord.memo,
            status: `${leaveTimeStr} 퇴근완료`
          });
        }

        setMyRecordId(null);
        setIsEditing(false);
        localStorage.removeItem('myRecordId');
        setName(''); setLocation(''); setContact(''); setMemo('');
      };

      const loadHistory = async () => {
        setShowHistory(true);
        if (!SCRIPT_URL) return; 
        setIsLoadingHistory(true);
        try {
          const response = await fetch(`${SCRIPT_URL}?t=${new Date().getTime()}`);
          const rawData = await response.json();
          setPastRecords(sanitizeServerData(rawData));
        } catch (e) { console.log("기록 불러오기 실패", e); }
        setIsLoadingHistory(false);
      };

      const formatShortDate = (dateStr) => {
        if (!dateStr) return '';
        if (String(dateStr).includes('T')) {
          const d = new Date(dateStr);
          if (!isNaN(d.getTime())) {
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            return `${d.getFullYear().toString().slice(2)}.${d.getMonth() + 1}.${d.getDate()}(${dayNames[d.getDay()]})`;
          }
        }
        const regex = /(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일\s*(.)요일/;
        const match = String(dateStr).match(regex);
        return match ? `${match[1].slice(2)}.${match[2]}.${match[3]}(${match[4]})` : dateStr;
      };

      const formatShortTime = (timeStr) => {
        if (!timeStr) return '';
        if (String(timeStr).includes('T')) {
          const d = new Date(timeStr);
          if (!isNaN(d.getTime())) {
            return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
          }
        }
        return timeStr;
      };

      const latestTime = useMemo(() => {
        if (safeRecords.length === 0) return null;
        const activeRecords = safeRecords.filter(r => !r.isLeft);
        if (activeRecords.length === 0) return null;
        const timesInMinutes = activeRecords.map(r => {
          const timeVal = r.time || '00:00';
          const [h, m] = String(timeVal).split(':').map(Number);
          return (h || 0) * 60 + (m || 0);
        });
        const maxTime = Math.max(...timesInMinutes);
        return `${Math.floor(maxTime / 60).toString().padStart(2, '0')}:${(maxTime % 60).toString().padStart(2, '0')}`;
      }, [safeRecords]);

      const myRecord = safeRecords.find(r => r.id === myRecordId);
      const displayUsers = [...safeRecords].sort((a, b) => String(a.time || '').localeCompare(String(b.time || '')));
      
      const showForm = !myRecord || myRecord.isLeft || isEditing;
      const amILatest = myRecord && !myRecord.isLeft && myRecord.time === latestTime;

      const avatarColors = [
        'bg-rose-100 text-rose-600 border-rose-200',
        'bg-orange-100 text-orange-600 border-orange-200',
        'bg-emerald-100 text-emerald-600 border-emerald-200',
        'bg-sky-100 text-sky-600 border-sky-200',
        'bg-purple-100 text-purple-600 border-purple-200'
      ];

      return (
        <div className="min-h-screen bg-gradient-to-br from-[#fcf3d9] via-[#f7d6e0] to-[#d6f0e6] text-stone-800 p-4 selection:bg-rose-200 relative overflow-x-hidden font-body">
          <style>{`
            @font-face { font-family: 'KerisKeduLine'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-3@1.0/KERISKEDU_Line.woff2') format('woff2'); font-weight: normal; font-display: swap; }
            @font-face { font-family: 'CookieRun'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/CookieRun-Regular.woff') format('woff'); font-weight: normal; font-display: swap; }
            @font-face { font-family: 'OmuDaye'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2304-01@1.0/omyu_pretty.woff2') format('woff2'); font-weight: normal; font-display: swap; }
            .font-title { font-family: 'KerisKeduLine', sans-serif; }
            .font-date { font-family: 'CookieRun', sans-serif; }
            .font-body { font-family: 'OmuDaye', sans-serif; letter-spacing: 0.5px; }
            ::-webkit-scrollbar { width: 8px; }
            ::-webkit-scrollbar-thumb { background: #fcd2d9; border-radius: 10px; }
          `}</style>

          <div className="max-w-md lg:max-w-5xl mx-auto relative z-10 px-1 lg:px-4">
            <header className="text-center pt-6 pb-6 lg:pb-8">
              <h1 className="text-3xl lg:text-4xl font-title text-rose-500 mb-4 drop-shadow-sm flex items-center justify-center gap-2">🏫 홍북초 야근 현황 🌃</h1>
              <button onClick={loadHistory} className="inline-flex items-center justify-center gap-1.5 bg-rose-50 px-4 py-2 rounded-full shadow-md border-[3px] border-rose-100 hover:bg-rose-100 transition-colors">
                <ChevronLeft className="w-5 h-5 text-rose-400" />
                <span className="text-base lg:text-lg font-date text-rose-500 tracking-wide pt-1 pr-1">{dateString}</span>
              </button>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8 items-start">
              <div className="bg-white/95 backdrop-blur-sm rounded-[2rem] p-6 shadow-xl border-4 border-rose-50">
                {showForm ? (
                  <div className="space-y-4">
                    <h2 className="text-xl font-bold text-stone-700 flex items-center gap-2 justify-center mb-5 bg-rose-50 py-2.5 rounded-2xl">
                      <Star className="w-5 h-5 text-yellow-400 fill-yellow-400" /> 언제 퇴근하실 예정이신가요?
                    </h2>
                    
                    <div className="space-y-3">
                      <div className="relative">
                        <div className="flex bg-rose-50/50 rounded-2xl border-2 border-rose-100 overflow-hidden focus-within:border-rose-300 focus-within:bg-white transition-all">
                          <div className="px-4 flex items-center bg-rose-100/50 text-rose-400"><User className="w-5 h-5" /></div>
                          <input 
                            type="text" 
                            placeholder="이름 (필수)" 
                            className="w-full bg-transparent p-3 outline-none text-stone-700 placeholder-stone-400 font-bold text-lg"
                            value={name}
                            onChange={(e) => setName(e.target.value)}
                            onFocus={() => suggestions.length > 0}
                          />
                        </div>
                        {suggestions.length > 0 && (
                          <div className="absolute top-full left-0 right-0 mt-2 bg-white rounded-2xl shadow-2xl border-2 border-rose-100 z-50 overflow-hidden animate-in fade-in slide-in-from-top-2 duration-200">
                            <div className="p-2 bg-rose-50/50 text-rose-400 text-xs font-bold px-4 py-1 flex items-center gap-1">
                              <ChevronDown className="w-3 h-3" /> 본인의 정보를 선택하면 자동 입력됩니다
                            </div>
                            {suggestions.map((p, i) => (
                              <button
                                key={i}
                                onClick={() => handleSelectSuggestion(p)}
                                className="w-full text-left p-3 px-4 hover:bg-rose-50 transition-colors flex items-center justify-between border-t border-rose-50 first:border-t-0"
                              >
                                <div>
                                  <span className="font-bold text-stone-700 text-lg">{p.name}</span>
                                  {p.location && <span className="ml-2 text-stone-400 text-sm">({p.location})</span>}
                                  {p.contact && <span className="ml-2 text-stone-400 text-sm tracking-tight">📞 {p.contact}</span>}
                                </div>
                                {p.todayId && <span className="text-[10px] bg-rose-500 text-white px-2 py-0.5 rounded-full font-bold shrink-0 ml-2">오늘 등록됨</span>}
                              </button>
                            ))}
                          </div>
                        )}
                      </div>

                      <div className="flex gap-2">
                        <div className="flex-1 flex bg-rose-50/50 rounded-2xl border-2 border-rose-100 overflow-hidden focus-within:border-rose-300 focus-within:bg-white transition-all">
                          <div className="px-4 flex items-center bg-rose-100/50 text-rose-400"><Clock className="w-5 h-5" /></div>
                          <select className="w-full bg-transparent p-3 outline-none text-stone-700 font-bold text-lg appearance-none cursor-pointer" value={hour} onChange={(e) => setHour(e.target.value)}>
                            {hourOptions.map(h => <option key={h} value={h}>{h}시</option>)}
                          </select>
                        </div>
                        <div className="flex-1 flex bg-rose-50/50 rounded-2xl border-2 border-rose-100 overflow-hidden focus-within:border-rose-300 focus-within:bg-white transition-all">
                          <select className="w-full bg-transparent p-3 outline-none text-stone-700 font-bold text-lg appearance-none cursor-pointer" value={minute} onChange={(e) => setMinute(e.target.value)}>
                            {minuteOptions.map(m => <option key={m} value={m}>{m}분</option>)}
                          </select>
                        </div>
                      </div>

                      <div className="flex bg-rose-50/50 rounded-2xl border-2 border-rose-100 overflow-hidden focus-within:border-rose-300 focus-within:bg-white transition-all">
                        <div className="px-4 flex items-center bg-rose-100/50 text-rose-400"><Phone className="w-5 h-5" /></div>
                        <input type="text" placeholder="연락처 (필수)" className="w-full bg-transparent p-3 outline-none text-stone-700 placeholder-stone-400 text-lg" value={contact} onChange={(e) => setContact(e.target.value)} onBlur={(e) => setContact(formatPhoneNumber(e.target.value))} />
                      </div>

                      <div className="flex bg-rose-50/50 rounded-2xl border-2 border-rose-100 overflow-hidden focus-within:border-rose-300 focus-within:bg-white transition-all">
                        <div className="px-4 flex items-center bg-rose-100/50 text-rose-400"><MapPin className="w-5 h-5" /></div>
                        <input type="text" placeholder="교실/부서 (선택)" className="w-full bg-transparent p-3 outline-none text-stone-700 placeholder-stone-400 text-lg" value={location} onChange={(e) => setLocation(e.target.value)} />
                      </div>

                      <div className="flex bg-rose-50/50 rounded-2xl border-2 border-rose-100 overflow-hidden focus-within:border-rose-300 focus-within:bg-white transition-all">
                        <div className="px-4 flex items-center bg-rose-100/50 text-rose-400"><MessageSquare className="w-5 h-5" /></div>
                        <input type="text" placeholder="간단한 메모 (선택)" className="w-full bg-transparent p-3 outline-none text-stone-700 placeholder-stone-400 text-lg" value={memo} onChange={(e) => setMemo(e.target.value)} />
                      </div>

                      <button onClick={handleSave} className="w-full bg-rose-400 hover:bg-rose-500 text-white font-bold text-xl py-3 rounded-2xl shadow-lg mt-4 transition-all transform hover:scale-[1.02] active:scale-95">
                        {isEditing ? '수정 완료' : '저장하기 꾹!'}
                      </button>
                      {isEditing && <button onClick={() => setIsEditing(false)} className="w-full bg-stone-100 text-stone-500 font-bold text-lg py-2 rounded-2xl mt-2 transition-all">수정 취소</button>}
                    </div>
                  </div>
                ) : (
                  <div className="text-center space-y-3 py-4 lg:py-8">
                    <div className="inline-block p-4 bg-rose-100 rounded-full mb-2 animate-bounce shadow-sm"><CheckCircle2 className="w-10 h-10 text-rose-500" /></div>
                    <div>
                      {myRecord.location && <p className="text-stone-400 text-base mb-1">{myRecord.location}</p>}
                      <p className="text-xl font-bold text-stone-700"><span className="text-rose-500 text-2xl">{myRecord.name}</span> 선생님은</p>
                      <p className="text-xl font-black mt-3 text-stone-800 bg-rose-50 inline-block px-5 py-2.5 rounded-2xl border border-rose-100 font-date shadow-sm">{myRecord.time} 퇴근 예정</p>
                    </div>
                    {amILatest && <div className="mt-5 mb-2"><span className="bg-rose-500 text-white font-date font-bold text-sm px-4 py-1.5 rounded-full animate-pulse inline-block shadow-md">🚨 문단속 담당 예정</span></div>}
                    <div className="flex gap-4 pt-6 border-t-2 border-dashed border-rose-100 mt-6">
                      <button onClick={() => { 
                        setName(myRecord.name || ''); 
                        setLocation(myRecord.location || ''); 
                        setContact(myRecord.contact || ''); 
                        setMemo(myRecord.memo || ''); 
                        const timeStr = myRecord.time || '00:00';
                        const [h, m] = timeStr.split(':'); 
                        setHour(h || '09'); setMinute(m || '00'); 
                        setIsEditing(true); 
                      }} className="flex-1 flex items-center justify-center gap-2 bg-emerald-50 text-emerald-600 border border-emerald-200 font-bold text-lg py-3 rounded-2xl"><Edit2 className="w-5 h-5" /> 수정</button>
                      <button onClick={handleLeave} className="flex-1 flex items-center justify-center gap-2 bg-rose-500 text-white font-bold text-lg py-3 rounded-2xl shadow-md"><LogOut className="w-5 h-5" /> 퇴근!</button>
                    </div>
                  </div>
                )}
              </div>

              <div className="bg-white/95 backdrop-blur-sm rounded-[2rem] p-5 lg:p-6 shadow-xl border-4 border-orange-100/50 h-full">
                <div className="flex items-center justify-between mb-5">
                  <h2 className="text-xl font-bold text-stone-700 flex items-center gap-2">👀 오늘의 야근 현황</h2>
                  <span className="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-sm font-bold font-date shadow-sm">현재 {displayUsers.filter(u => !u.isLeft).length}명</span>
                </div>
                {displayUsers.length === 0 ? (
                  <div className="text-center py-12 bg-orange-50/50 rounded-2xl border-2 border-dashed border-orange-200"><span className="text-3xl block mb-3">🎉</span><p className="text-stone-500 font-bold text-lg leading-snug">아직 야근 등록한 선생님이 없어요!<br/>칼퇴를 기원합니다 ◡̈</p></div>
                ) : (
                  <div className="space-y-3">
                    {displayUsers.map((user, index) => {
                      const isLatest = !user.isLeft && user.time === latestTime;
                      return (
                        <div key={user.id} className={`flex items-start p-4 rounded-2xl transition-all ${user.isLeft ? 'bg-stone-50/60' : isLatest ? 'bg-white border-2 border-orange-200 shadow-md transform scale-[1.01]' : 'bg-white border border-orange-100 shadow-sm'}`}>
                          <div className="flex gap-4 w-full">
                            <div className={`shrink-0 w-12 h-12 rounded-2xl flex items-center justify-center font-bold text-xl border font-date mt-0.5 ${user.isLeft ? 'bg-stone-200 text-stone-400 border-stone-300' : avatarColors[index % avatarColors.length]}`}>{String(user.name || '?').charAt(0)}</div>
                            <div className="flex flex-col flex-1 justify-center">
                              <div className="flex items-baseline gap-2 flex-wrap mb-1">
                                <p className={`font-bold text-lg lg:text-xl ${user.isLeft ? 'text-stone-400 line-through decoration-2' : 'text-stone-700'}`}>{user.name}</p>
                                <p className={`font-black font-date text-lg tracking-tight ${user.isLeft ? 'text-stone-400 line-through decoration-2' : isLatest ? 'text-rose-500' : 'text-stone-500'}`}>{user.time}</p>
                                {user.isLeft && user.leaveTime && <p className="font-bold font-date text-sm text-stone-500">({user.leaveTime} 퇴근)</p>}
                                {isLatest && !user.isLeft && <span className="flex items-center gap-1 text-[11px] bg-rose-500 text-white px-2 py-0.5 rounded-full font-bold shadow-sm animate-pulse font-date ml-1 self-center">최종 담당</span>}
                              </div>
                              {(user.location || user.contact || user.memo) && (
                                <div className="flex flex-col items-start gap-1">
                                  {(user.location || user.contact) && (
                                    <p className={`text-sm lg:text-base font-medium leading-relaxed ${user.isLeft ? 'text-stone-400' : 'text-stone-500'}`}>
                                      {user.location} {user.location && user.contact && <span className="mx-2"></span>}
                                      {user.contact && <span className={`inline-flex items-center gap-1 ${user.isLeft ? 'text-stone-400' : 'text-stone-500'}`}>📞 {user.contact}</span>}
                                    </p>
                                  )}
                                  {user.memo && <p className={`text-sm mt-0.5 font-medium inline-block px-2.5 py-1 rounded-lg border ${user.isLeft ? 'bg-stone-100 text-stone-400 border-stone-200' : 'bg-rose-50 text-rose-500 border-rose-100'}`}>{user.memo}</p>}
                                </div>
                              )}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
                {displayUsers.filter(u => !u.isLeft).length > 0 && <div className="mt-5 p-4 bg-orange-50/80 rounded-xl flex items-start gap-3 text-stone-600 text-base border border-orange-100 shadow-sm leading-snug"><span className="text-xl mt-0.5">📢</span><p>최종 퇴청자는 <span className="font-extrabold text-pink-600">전기 차단, 경비 셋팅</span> 부탁드립니다. 🚨</p></div>}
              </div>
            </div>
          </div>

          {showHistory && (
            <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-[2rem] p-6 lg:p-8 max-w-2xl w-full shadow-2xl relative animate-in fade-in zoom-in border-4 border-rose-100 max-h-[85vh] flex flex-col">
                <button onClick={() => setShowHistory(false)} className="absolute top-5 right-5 text-stone-400 bg-stone-100 rounded-full p-2"><X className="w-5 h-5 lg:w-6 lg:h-6" /></button>
                <div className="text-center pb-5 pt-2 border-b-2 border-stone-100 shrink-0"><h3 className="text-2xl font-bold text-stone-700">지난 내역 보기</h3></div>
                <div className="overflow-y-auto flex-1 py-4 px-2 lg:px-4 mt-2">
                  {!SCRIPT_URL ? <div className="text-center py-6"><div className="text-4xl mb-4">📊</div><p className="text-lg text-stone-500">시트가 연결되지 않았습니다!</p></div> : isLoadingHistory ? <div className="text-center py-12 text-stone-400 font-bold text-xl animate-pulse">기록을 불러오는 중... 🔍</div> : safePastRecords.length === 0 ? <div className="text-center py-12 text-stone-400 font-bold text-xl">저장된 기록이 없습니다.</div> : (
                    <div className="space-y-1">
                      {safePastRecords.map((record, i) => {
                        const isLeft = String(record.status || '').includes('퇴근');
                        const displayTime = isLeft ? String(record.status).split(' ')[0] : formatShortTime(record.time);
                        return (
                          <div key={i} className="flex items-center justify-between py-2 border-b border-stone-100 last:border-0 hover:bg-rose-50/50 px-1 rounded-xl">
                            <div className="flex items-center gap-2 lg:gap-4 w-full">
                              <span className="text-sm lg:text-base text-stone-400 w-[75px] lg:w-[100px] shrink-0">{formatShortDate(record.date)}</span>
                              <span className="text-base lg:text-lg font-bold text-stone-700 w-[50px] lg:w-[65px] shrink-0 truncate">{record.name}</span>
                              <span className={`text-base lg:text-lg font-date ${isLeft ? 'text-stone-400' : 'text-rose-500'}`}>{displayTime}</span>
                              <div className="flex-1 flex justify-end pl-1"><span className={`text-xs lg:text-sm font-bold px-2 py-1 rounded-full ${isLeft ? 'bg-stone-100 text-stone-500' : 'bg-rose-100 text-rose-500'}`}>{isLeft ? '퇴근완료' : '근무중'}</span></div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
                <button onClick={() => setShowHistory(false)} className="w-full mt-5 bg-stone-800 text-white font-bold text-xl py-3 rounded-2xl shrink-0">닫기</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
